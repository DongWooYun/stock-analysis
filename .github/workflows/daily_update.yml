name: Daily Stock Update

on:
  schedule:
    - cron: '0 0 * * 1-5'  # 평일 09:00 KST (파이프라인)
    - cron: '0 0 * * *'    # 매일 09:00 KST (ping)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pipeline:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests
          pip install git+https://github.com/FinanceData/FinanceDataReader.git

      - name: Run pipeline
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python pipeline.py

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add streamlit_app/data/output/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update: $(date +'%Y-%m-%d')"
          git push

  ping-streamlit:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit (슬립 방지 - 매일)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
          https://stock-analysis-dongwooyun.streamlit.app/ || true
          echo "Streamlit ping 완료"
