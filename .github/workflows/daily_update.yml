name: Daily Stock Update

on:
  schedule:
    - cron: '0 0 * * 1-5'  # 평일 매일 UTC 00:00 (한국 09:00)
  workflow_dispatch:         # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests
          pip install git+https://github.com/FinanceData/FinanceDataReader.git

      - name: Run pipeline
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python pipeline.py

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add streamlit_app/data/output/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update: $(date +'%Y-%m-%d')"
          git push
